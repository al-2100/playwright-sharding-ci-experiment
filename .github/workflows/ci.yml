name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-24.04
    services:
      juice-shop:
        image: ghcr.io/al-2100/juice-shop-thesis@sha256:046398115a477c5c4b6b1fccead365d4a447ba466f82db7c3e30f4ddbade2ad8
        ports:
          - 3000:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node scripts/wait-for-app.mjs
      - name: Run Playwright suite
        run: npm test -- --workers=1
